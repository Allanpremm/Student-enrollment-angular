<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
  <mat-form-field>
    <mat-label>Student</mat-label>
    <mat-select formControlName="studentId">
      <mat-option *ngFor="let student of students" [value]="student.id">{{ student.name }}</mat-option>
    </mat-select>
  </mat-form-field>
  <mat-form-field>
    <mat-label>Course</mat-label>
    <mat-select formControlName="courseId">
      <mat-option *ngFor="let course of courses" [value]="course.id">{{ course.title }}</mat-option>
    </mat-select>
  </mat-form-field>
  <button mat-raised-button color="primary" type="submit" [disabled]="!enrollForm.valid">Enroll</button>
</form>
<div *ngIf="showSuccess" class="success-message">Enrollment successful!</div>
