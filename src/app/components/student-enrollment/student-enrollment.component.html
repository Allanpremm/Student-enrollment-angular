<h2 *ngIf="student">Enrollments for {{ student.name }}</h2>
<div *ngIf="courses.length > 0; else noEnrollments" class="course-list">
  <mat-card *ngFor="let course of courses" class="course-card">
    <mat-card-header>
      <mat-card-title>{{ course.title }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>{{ course.description }}</p>
      <p>Credits: {{ course.credits }}</p>
    </mat-card-content>
  </mat-card>
</div>
<ng-template #noEnrollments>
  <p>No enrollments found.</p>
</ng-template>
